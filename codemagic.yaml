workflows:
  android-kotlin-workflow:
    name: Android Kotlin ZIP Workflow
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      groups:
        - android-signing
      vars:
        PACKAGE_NAME: "com.example.youtubelite"
      node: latest
    triggering:
      events:
        - push
        - tag
      branch_patterns:
        - pattern: 'main'
          include: true
    scripts:
      - name: Unzip Project Files
        script: |
          echo "Unzipping project files..."
          unzip -o youtube-lite.zip
          
          if [ -d "youtube-lite" ]; then
            mv youtube-lite/* .
            mv youtube-lite/.* . 2>/dev/null || true
            rm -rf youtube-lite
          fi
          
          ls -la
      - name: Set up local.properties
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
      - name: Build Android APK
        script: |
          echo "Generating temporary debug keystore..."
          keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          
          echo "Generating specific gradle wrapper version 9.3.1..."
          gradle wrapper --gradle-version 9.3.1
          chmod +x gradlew
          ./gradlew assembleDebug
    artifacts:
      - app/build/outputs/apk/**/*.apk
